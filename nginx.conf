# Nginx Configuration for Laravel AI CRM

# Define the server block
server {
    # Listen on port 80 for HTTP requests
    listen 80;
    # Listen on port 443 for HTTPS requests
    listen [::]:443 ssl ipv6only=on;
    # Server name
    server_name example.com www.example.com;

    # SSL/TLS configuration
    ssl_certificate /path/to/ssl/certificate.crt;
    ssl_certificate_key /path/to/ssl/private/key.key;

    # Set the document root
    root /path/to/project/public;

    # Index file
    index index.php index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Enable HTTP/2
    http2_push_preload on;

    # Enable SSL/TLS protocol
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Set the SSL/TLS cipher suite
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES256-GCM-SHA384;

    # Set the SSL/TLS session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Enable OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Enable HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    # Enable Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; object-src 'none'; frame-ancestors 'none';";

    # Enable Cross-Origin Resource Sharing (CORS)
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
    add_header Access-Control-Allow-Headers "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type";

    # Enable CORS preflight
    if ($request_method = OPTIONS) {
        return 200;
    }

    # Enable Laravel's built-in PHP-FPM handler
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        include fastcgi_params;
    }

    # Enable Laravel's public directory
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Enable Laravel's cache
    location /cache {
        internal;
        alias /path/to/project/storage/framework/cache;
    }

    # Enable Laravel's logs
    location /logs {
        internal;
        alias /path/to/project/storage/logs;
    }

    # Enable Laravel's sessions
    location /sessions {
        internal;
        alias /path/to/project/storage/framework/sessions;
    }

    # Enable Laravel's views
    location /views {
        internal;
        alias /path/to/project/resources/views;
    }
}